<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tytuł przykładowej strony</title>
    <meta name="author" content="Mateusz Skrzyiński">
</head>
<body>
<!--Pierwszy przykład-->
<table border="5">
    <tr>
        <td>1</td>
        <td>2</td>
    </tr>
    <tr>
        <td colspan="2">3</td>
    </tr>
</table>
</body>
<body>
<!--Drugi przykład-->
<table border="5">
    <tr>
        <td rowspan="2">1</td>
        <td>2</td>
    </tr>
    <tr>
        <td>3</td>
    </tr>
</table>
</body>
</html>
