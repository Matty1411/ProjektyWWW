<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Transformaty</title>
    <meta name="author" content="Mateusz Skrzypiński">

    <style>
        canvas {
            border: 1px dashed black;
        }
    </style>

    <script>
        window.onload = function() {
            var canvas = document.getElementById("drawingCanvas");
            var context = canvas.getContext("2d");

            context.rect(0, 0, 50, 30);
            context.fillStyle = "purple";
            context.fill();

            context.beginPath();
            context.rect(50, 50, 50, 30);
            context.fillStyle = "blue";
            context.fill();

            context.beginPath();
            context.rect(100, 100, 50, 30);
            context.fillStyle = "yellow";
            context.fill();

            context.stroke();

        };
    </script>
</head>
<body>
<canvas id="drawingCanvas" width="500" height="300"></canvas>
</body>
</html>
