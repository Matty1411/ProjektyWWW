<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Linie</title>
    <meta name="author" content="Mateusz Skrzypiński">

  <style>
    canvas {
      border: 1px dashed black;
    }
  </style>

  <script>
    window.onload = function() {
      var canvas = document.getElementById("drawingCanvas");
      var context = canvas.getContext("2d")
      // Umieść kod odpowiedzialny za rysowanie w tym miesjcu.

      context.lineWidth = 20;
      context.strokeStyle = "rgb(224,223,21)";

      context.moveTo(70,10);
      context.lineTo(70,270);
      context.lineCap = "butt";
      context.stroke();

      context.beginPath();
      context.strokeStyle = "rgb(21,31,224)"
      context.moveTo(140,10);
      context.lineTo(140,270);
      context.lineCap = "round";
      context.stroke();

      context.beginPath();
      context.strokeStyle = "rgb(65,224,21)"
      context.moveTo(280,10);
      context.lineTo(280,270);
      context.lineCap = "square";
      context.stroke();
    };
  </script>
</head>
<body>
<canvas id="drawingCanvas" width="500" height="300"></canvas>
</body>
</html>
