<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Przykład lini</title>
  <meta name="author" content="Mateusz Skrzypiński">

  <style>
    canvas {
      border: 1px dashed black;
    }
  </style>

  <script>
    window.onload = function() {
      var canvas = document.getElementById("drawingCanvas");
      var context = canvas.getContext("2d")

      context.lineWidth = 20;
      context.strokeStyle = "rgb(205,40,40)"
      context.moveTo(70,10);
      context.lineTo(70,270);
      context.lineCap = "butt";
      context.stroke();

      context.beginPath();
      context.lineWidth = 10;
      context.strokeStyle = "rgb(205,40,202)"
      context.moveTo(80,10);
      context.lineTo(200,130);
      context.lineCap = "round";
      context.stroke();

      context.beginPath();
      context.lineWidth = 25;
      context.strokeStyle = "rgb(13,206,38)"
      context.moveTo(200,130);
      context.lineTo(325,20);
      context.lineCap = "square";
      context.stroke();

      context.beginPath();
      context.lineWidth = 15;
      context.strokeStyle = "rgb(234,231,23)"
      context.moveTo(325,20);
      context.lineTo(324,260);
      context.lineCap = "round";
      context.stroke();
    };
  </script>

</head>
<body>
<canvas id="drawingCanvas" width="500" height="300"></canvas>
</body>
</html>
