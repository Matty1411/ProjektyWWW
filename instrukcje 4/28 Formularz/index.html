<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tytuł przykładowej strony</title>
  <meta name="author" content="Mateusz Skrzypiński">
</head>
<body>
<form action="http://www.roy.icenter.pl/form/" method="post">
<fieldset>
  <legend> Zostaw swój komentarz
  </legend>
  <input type="hidden" name="to" value="twoj@adres-email.pl" />
  <input type="hidden" name="subject" value="Testowa wiadomość" />
  <dl>
    <dt><strong>Imię</strong>
    </dt>
    <dd>
      <input type="text" name="imię" size="30" />
    </dd>
    <dt><strong>E-mail:</strong>
    </dt>
    <dd>
      <input type="email" name="imię" size="30" />
    </dd>
    <dt><strong>Komentarz</strong>
    </dt>
    <dd>
      <textarea name="opinie" rows="30" cols="50"></textarea>
    </dd>
  </dl>
  <p>
    <input type="submit" value="Wyślij" />
  </p>
</fieldset>
</form>
</body>
</html>
